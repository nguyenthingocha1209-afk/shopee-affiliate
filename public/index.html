<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Mì trộn Indomie</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #fff7f0;
      text-align: center;
    }

    .container {
      max-width: 400px;
      margin: auto;
      padding: 20px;
    }

    .title {
      font-size: 24px;
      font-weight: bold;
      color: #ff5722;
    }

    .img {
      width: 100%;
      border-radius: 12px;
      margin: 15px 0;
    }

    .price {
      font-size: 20px;
      color: red;
      font-weight: bold;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 15px;
      margin-top: 15px;
      background: #ff5722;
      color: white;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    .btn:hover {
      background: #e64a19;
    }

    .box {
      background: white;
      padding: 15px;
      border-radius: 12px;
      margin-top: 15px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    input {
      width: 90%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
  </style>
</head>
<body>

<div class="container">

  <div class="title">🔥 Mì trộn Indomie siêu hot</div>

  <img class="img" src="https://cf.shopee.vn/file/6c5c6d3b7f4f0d3fcb0c8c91b2b1b4f5">

  <div class="price">Chỉ từ 35.000đ</div>
  <p>🍜 Ngon - cay nhẹ - ăn là ghiền</p>
  <p>🎁 Hoàn 5% xu khi mua qua link</p>

  <a href="/go">
    <button class="btn">👉 MUA NGAY</button>
  </a>

  <div class="box">
    <h3>💰 Nhận hoàn tiền</h3>
    <input placeholder="Nhập SĐT"><br>
    <input placeholder="Mã đơn hàng"><br>
    <button class="btn">Gửi thông tin</button>
  </div>

</div>

</body>
</html>
