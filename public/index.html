<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Mì trộn Indomie</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
}

.header {
  background: #ee4d2d;
  color: white;
  padding: 12px;
  font-weight: bold;
}

.container {
  max-width: 420px;
  margin: auto;
  background: white;
}

.img {
  width: 100%;
}

.info {
  padding: 15px;
}

.title {
  font-size: 16px;
  margin-bottom: 10px;
}

.price-old {
  text-decoration: line-through;
  color: gray;
}

.price-new {
  color: #ee4d2d;
  font-size: 22px;
  font-weight: bold;
}

.tag {
  background: #ee4d2d;
  color: white;
  padding: 3px 6px;
  font-size: 12px;
  border-radius: 4px;
}

.btn {
  position: fixed;
  bottom: 0;
  width: 100%;
  max-width: 420px;
  background: #ee4d2d;
  color: white;
  padding: 15px;
  font-size: 18px;
  border: none;
}

.box {
  padding: 15px;
  background: #fff;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="header">Shopee</div>

<div class="container">

<img class="img" src="https://cf.shopee.vn/file/6c5c6d3b7f4f0d3fcb0c8c91b2b1b4f5">

<div class="info">
  <span class="tag">Yêu thích</span>
  <div class="title">Mì trộn Indomie cay siêu ngon ăn là ghiền</div>

  <div class="price-old">59.000đ</div>
  <div class="price-new">35.000đ</div>
</div>

<div class="box">
  🎁 Hoàn 5% xu khi mua qua link  
</div>

<div class="box">
  💰 Nhập thông tin nhận hoàn tiền  
  <br><br>
  <input placeholder="SĐT"><br><br>
  <input placeholder="Mã đơn"><br><br>
</div>

</div>

<a href="/go">
  <button class="btn">Mua ngay</button>
</a>

</body>
</html>
